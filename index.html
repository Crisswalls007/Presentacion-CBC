document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

"<!DOCTYPE html>\n<html lang=\"es\"><head>\n<meta charset=\"utf-8\">\n<title>Fundamentos Estratégicos del Rebranding · CBC<\u002Ftitle>\n<meta name=\"viewport\" content=\"width=1920, initial-scale=1\">\n<style>/* ==========================================================================\n   CBC — Cuerpo de Bomberos de Concepción\n   Design Tokens: Colors and Type\n   --------------------------------------------------------------------------\n   Source of truth: Manual de Marca CBC (see /source/Manual_CBC.pdf)\n   ========================================================================== */\n\n/* Archivo — primary brand typeface. Self-host the .ttf in /fonts/ for\n   offline / print use; the @import below covers digital. The manual\n   shows Light → Black usage; we expose 300/400/500/600/700/800/900. */\n/* vietnamese */\n@font-face {\n  font-family: 'Archivo';\n  font-style: italic;\n  font-weight: 300 900;\n  font-stretch: 100%;\n  font-display: swap;\n  src: url(\"99fa667a-d218-4335-a179-0094256e55dc\") format('woff2');\n  unicode-range: U+0102-0103, U+0110-0111, U+0128-0129, U+0168-0169, U+01A0-01A1, U+01AF-01B0, U+0300-0301, U+0303-0304, U+0308-0309, U+0323, U+0329, U+1EA0-1EF9, U+20AB;\n}\n/* latin-ext */\n@font-face {\n  font-family: 'Archivo';\n  font-style: italic;\n  font-weight: 300 900;\n  font-stretch: 100%;\n  font-display: swap;\n  src: url(\"a249b266-4f1a-4793-8746-95ac8488883f\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Archivo';\n  font-style: italic;\n  font-weight: 300 900;\n  font-stretch: 100%;\n  font-display: swap;\n  src: url(\"91bf642a-3815-4315-91c5-5bfbd94c6913\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n/* vietnamese */\n@font-face {\n  font-family: 'Archivo';\n  font-style: normal;\n  font-weight: 300 900;\n  font-stretch: 100%;\n  font-display: swap;\n  src: url(\"f494fee0-7476-4ff2-b70a-3eba9aac00da\") format('woff2');\n  unicode-range: U+0102-0103, U+0110-0111, U+0128-0129, U+0168-0169, U+01A0-01A1, U+01AF-01B0, U+0300-0301, U+0303-0304, U+0308-0309, U+0323, U+0329, U+1EA0-1EF9, U+20AB;\n}\n/* latin-ext */\n@font-face {\n  font-family: 'Archivo';\n  font-style: normal;\n  font-weight: 300 900;\n  font-stretch: 100%;\n  font-display: swap;\n  src: url(\"a616d786-32f0-4efe-852d-a164f7db49f1\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Archivo';\n  font-style: normal;\n  font-weight: 300 900;\n  font-stretch: 100%;\n  font-display: swap;\n  src: url(\"af9ccb07-582e-4736-9c9e-b8c2827361eb\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n\n\n:root {\n  /* ---------- COLOR — Brand primaries (Manual p.09) ---------- */\n  --cbc-red:           #D11C21;  /* Pantone 18-1664 TCX \"Fiery Red\"     | C10 M98 Y91 K2 */\n  --cbc-blue:          #1F3D80;  /* Pantone 19-3952 TCX \"Surf the Web\"  | C100 M82 Y19 K5 */\n  --cbc-cream:         #F3EBE0;  /* Pantone 11-0103 TCX \"Egret\"         | C6 M8 Y13 K0 */\n\n  /* ---------- COLOR — Functional neutrals (inferred from manual usage) ---------- */\n  --cbc-white:         #FFFFFF;\n  --cbc-ink:           #14213D;  /* darker blue used for high-emphasis body text on cream */\n  --cbc-ink-soft:      #2B4B96;  /* slightly lighter than --cbc-blue, used for body copy on cream */\n\n  /* ---------- COLOR — Tonal extensions of the brand ramp ---------- */\n  /* Reds — for hover/press/decorative gradients */\n  --cbc-red-900:       #8E1216;\n  --cbc-red-700:       #B0171C;\n  --cbc-red-500:       var(--cbc-red);\n  --cbc-red-300:       #E67377;\n  --cbc-red-100:       #F6CDCE;\n\n  /* Blues */\n  --cbc-blue-900:      #0E1F46;\n  --cbc-blue-700:      #163068;\n  --cbc-blue-500:      var(--cbc-blue);\n  --cbc-blue-300:      #6F84B8;\n  --cbc-blue-100:      #CDD3E6;\n\n  /* Creams */\n  --cbc-cream-200:     #FAF5EE;  /* lighter wash for very subtle backgrounds */\n  --cbc-cream-500:     var(--cbc-cream);\n  --cbc-cream-700:     #D8CDBD;  /* watermark / 12% logo on cream emulation */\n\n  /* ---------- COLOR — Semantic foreground / background ---------- */\n  --fg-default:        var(--cbc-blue);            /* \"ink\" — used for body on cream */\n  --fg-emphasis:       var(--cbc-blue-900);        /* H1 / display */\n  --fg-muted:          color-mix(in oklab, var(--cbc-blue) 60%, var(--cbc-cream));\n  --fg-accent:         var(--cbc-red);             /* accents, page numbers, callouts */\n  --fg-on-red:         var(--cbc-cream);           /* text on red surfaces */\n  --fg-on-blue:        var(--cbc-cream);           /* text on blue surfaces */\n\n  --bg-default:        var(--cbc-cream);           /* default page background */\n  --bg-surface:        var(--cbc-white);           /* card / sheet */\n  --bg-emphasis:       var(--cbc-red);\n  --bg-institutional:  var(--cbc-blue);\n\n  /* ---------- COLOR — Decorative gradients (Manual p.13 \"Degradados\") ---------- */\n  --grad-red-fade:     linear-gradient(90deg, var(--cbc-red) 0%, var(--cbc-cream) 100%);\n  --grad-blue-fade:    linear-gradient(90deg, var(--cbc-blue) 0%, var(--cbc-cream) 100%);\n  --grad-image-vignette: linear-gradient(180deg, transparent 40%, rgba(31,61,128,0.85) 100%); /* @kind color */\n\n  /* ---------- TYPE — Family ---------- */\n  --font-family-base:  'Archivo', system-ui, -apple-system, 'Segoe UI', sans-serif;\n  --font-family-display: 'Archivo', system-ui, sans-serif;\n\n  /* Tracking conventions observed in the manual */\n  --tracking-tight:    -0.01em;\n  --tracking-normal:   0;\n  --tracking-wide:     0.04em;\n  --tracking-caps:     0.08em;   /* used on submarca lock-ups: COMANDANCIA, SUPERINTENDENCIA */\n\n  /* ---------- TYPE — Weight aliases ---------- */\n  --weight-light:      300;\n  --weight-regular:    400;\n  --weight-medium:     500;\n  --weight-semibold:   600;\n  --weight-bold:       700;\n  --weight-extrabold:  800;\n  --weight-black:      900;\n\n  /* ---------- TYPE — Type scale (web-first; rems based on 16px) ---------- */\n  --text-display:      clamp(3.5rem, 6vw, 5.5rem);   /* Manual cover \"Manual de Marca\" */\n  --text-h1:           2.5rem;        /* section headers — Logotipo, Tipografía, etc. */\n  --text-h2:           1.875rem;\n  --text-h3:           1.375rem;\n  --text-h4:           1.125rem;\n  --text-body-lg:      1.0625rem;\n  --text-body:         1rem;\n  --text-body-sm:      0.875rem;\n  --text-caption:      0.75rem;\n  --text-overline:     0.6875rem;     /* PANTONE labels, formato labels */\n\n  /* ---------- TYPE — Line heights ---------- */\n  --lh-tight:          1.1; /* @kind other */          /* display, headlines */\n  --lh-snug:           1.25; /* @kind other */         /* H2/H3 */\n  --lh-base:           1.5; /* @kind other */          /* body */\n  --lh-loose:          1.65; /* @kind other */         /* long-form body */\n\n  /* ---------- SPACING (8pt-ish grid) ---------- */\n  --space-1:           4px;\n  --space-2:           8px;\n  --space-3:           12px;\n  --space-4:           16px;\n  --space-5:           24px;\n  --space-6:           32px;\n  --space-7:           48px;\n  --space-8:           64px;\n  --space-9:           96px;\n\n  /* ---------- RADII ---------- */\n  --radius-none:       0;\n  --radius-sm:         2px;\n  --radius-md:         4px;          /* the manual is largely rectilinear — small radii only */\n  --radius-lg:         8px;\n  --radius-pill:       999px;\n\n  /* ---------- ELEVATION — soft, almost flat. Manual is print-oriented. ---------- */\n  --shadow-1:          0 1px 2px rgba(20,33,61,0.06);\n  --shadow-2:          0 4px 14px rgba(20,33,61,0.10);\n  --shadow-3:          0 12px 32px rgba(20,33,61,0.14);\n\n  /* ---------- LAYOUT primitives ---------- */\n  --stripe-height:     6px;          /* the red/blue stripes used on letterhead headers */\n  --rule-color:        var(--cbc-red);\n  --rule-thickness:    2px;\n}\n\n/* ==========================================================================\n   Semantic element styles\n   ========================================================================== */\n\nhtml, body {\n  background: var(--bg-default);\n  color: var(--fg-default);\n  font-family: var(--font-family-base);\n  font-size: var(--text-body);\n  line-height: var(--lh-base);\n  -webkit-font-smoothing: antialiased;\n  text-rendering: optimizeLegibility;\n}\n\nh1, .h1 {\n  font-family: var(--font-family-display);\n  font-weight: var(--weight-extrabold);\n  font-size: var(--text-h1);\n  line-height: var(--lh-tight);\n  letter-spacing: var(--tracking-tight);\n  color: var(--fg-emphasis);\n  margin: 0;\n}\n\nh2, .h2 {\n  font-weight: var(--weight-bold);\n  font-size: var(--text-h2);\n  line-height: var(--lh-snug);\n  color: var(--fg-emphasis);\n  margin: 0;\n}\n\nh3, .h3 {\n  font-weight: var(--weight-bold);\n  font-size: var(--text-h3);\n  line-height: var(--lh-snug);\n  color: var(--fg-default);\n  margin: 0;\n}\n\nh4, .h4 {\n  font-weight: var(--weight-semibold);\n  font-size: var(--text-h4);\n  line-height: var(--lh-snug);\n  margin: 0;\n}\n\np, .body {\n  font-size: var(--text-body);\n  line-height: var(--lh-base);\n  color: var(--fg-default);\n  margin: 0;\n}\n\n.body-lg  { font-size: var(--text-body-lg); line-height: var(--lh-loose); }\n.body-sm  { font-size: var(--text-body-sm); }\n.caption  { font-size: var(--text-caption); color: var(--fg-muted); }\n.overline {\n  font-size: var(--text-overline);\n  letter-spacing: var(--tracking-caps);\n  text-transform: uppercase;\n  font-weight: var(--weight-bold);\n  color: var(--fg-accent);\n}\n\n.display {\n  font-family: var(--font-family-display);\n  font-weight: var(--weight-black);\n  font-size: var(--text-display);\n  line-height: var(--lh-tight);\n  letter-spacing: var(--tracking-tight);\n}\n\n.eyebrow {\n  /* The \"section header pattern\" used throughout the manual: bold blue label,\n     red vertical rule, then a short tagline. */\n  display: inline-flex;\n  align-items: center;\n  gap: var(--space-4);\n  color: var(--fg-emphasis);\n  font-weight: var(--weight-extrabold);\n}\n.eyebrow::after {\n  content: \"\";\n  display: block;\n  width: 2px;\n  height: 1em;\n  background: var(--cbc-red);\n}\n\ncode, kbd, samp, pre {\n  font-family: 'JetBrains Mono', 'Fira Code', ui-monospace, SFMono-Regular, Menlo, monospace;\n  font-size: 0.9em;\n}\n\n/* The red rule the manual uses above the footer on nearly every page */\n.cbc-rule {\n  height: var(--rule-thickness);\n  background: var(--cbc-red);\n  width: 220px;\n}\n\n/* The dual-color stripe motif (Recursos gráficos > Uso de franjas) */\n.cbc-stripe {\n  display: block;\n  height: var(--stripe-height);\n  background:\n    linear-gradient(var(--cbc-red), var(--cbc-red)) top/100% 2px no-repeat,\n    linear-gradient(var(--cbc-blue), var(--cbc-blue)) bottom/100% 2px no-repeat,\n    transparent;\n}\n<\u002Fstyle>\n\n<style id=\"slide-styles\">\n  /* ============================================================ DECK SHELL */\n  html, body { margin: 0; height: 100%; background: #000; overflow: hidden; }\n  morph-deck:not(:defined) { visibility: hidden; }\n  morph-deck { font-family: var(--font-family-base); }\n  /* Slides carry their own page numbers — hide the injected counter overlay */\n  .morph-counter { display: none !important; }\n  morph-deck section {\n    background: var(--cbc-cream);\n    color: var(--cbc-blue);\n    font-family: var(--font-family-base);\n    overflow: hidden;\n  }\n\n  /* ============================================================ VIEW TRANSITIONS */\n  ::view-transition-group(*) {\n    animation-duration: 720ms;\n    animation-timing-function: cubic-bezier(0.22, 1, 0.36, 1);\n  }\n  ::view-transition-old(root),\n  ::view-transition-new(root) {\n    animation-duration: 520ms;\n    animation-timing-function: cubic-bezier(0.4, 0, 0.2, 1);\n  }\n  ::view-transition-old(root) { animation-name: vt-fade-out; }\n  ::view-transition-new(root) { animation-name: vt-fade-in; }\n  @keyframes vt-fade-out { to { opacity: 0; } }\n  @keyframes vt-fade-in  { from { opacity: 0; } }\n\n  /* Shared morph names */\n  .m-logo  { view-transition-name: cbc-logo; }\n  .m-num   { view-transition-name: fund-num; }\n  .m-eyebrow { view-transition-name: fund-eyebrow; }\n  .m-title { view-transition-name: fund-title; }\n  .m-stripes { view-transition-name: cbc-stripes; }\n  .m-kicker  { view-transition-name: cbc-kicker; }\n  .m-mark-quote { view-transition-name: cbc-quote-mark; }\n\n  /* ============================================================ PRIMITIVES */\n  .slide {\n    width: 1920px; height: 1080px;\n    padding: 100px 120px 96px;\n    box-sizing: border-box;\n    position: relative;\n  }\n  .slide.dark { background: var(--cbc-blue); color: var(--cbc-cream); }\n  .slide.red  { background: var(--cbc-red);  color: var(--cbc-cream); }\n\n  .slide-foot {\n    position: absolute;\n    bottom: 44px; left: 120px; right: 120px;\n    display: flex; justify-content: space-between; align-items: flex-end;\n    font-size: 17px;\n    color: inherit;\n    opacity: 0.5;\n  }\n  .slide-foot .left { display: flex; align-items: center; gap: 14px; }\n  .slide-foot .red-tick { width: 70px; height: 2px; background: var(--cbc-red); }\n  .slide.dark .slide-foot .red-tick, .slide.red .slide-foot .red-tick { background: var(--cbc-cream); opacity: 0.7; }\n  .slide-foot .pgn {\n    font-family: var(--font-family-display);\n    font-weight: 800; font-variant-numeric: tabular-nums;\n    font-size: 19px; letter-spacing: 0.04em;\n  }\n\n  .eyebrow-row { display: inline-flex; align-items: center; gap: 22px; }\n  .eyebrow-row .word {\n    font-family: var(--font-family-display);\n    font-weight: 800; font-size: 38px; color: inherit;\n    letter-spacing: 0.01em; line-height: 1;\n    text-transform: uppercase;\n  }\n  .eyebrow-row .rule { width: 3px; height: 40px; background: var(--cbc-red); }\n  .slide.dark .eyebrow-row .rule, .slide.red .eyebrow-row .rule { background: var(--cbc-cream); }\n\n  .double-stripes { display: flex; flex-direction: column; gap: 6px; }\n  .double-stripes > div { flex: 1; }\n  .double-stripes .r { background: var(--cbc-red); }\n  .double-stripes .b { background: var(--cbc-blue); }\n  .slide.dark .double-stripes .b { background: var(--cbc-cream); }\n\n  .corner-logo {\n    position: absolute; top: 86px; right: 120px;\n    width: 188px; height: auto;\n  }\n  .slide.dark .corner-logo, .slide.red .corner-logo { filter: brightness(0) invert(1); }\n\n  /* ============================================================ 1 · TITLE */\n  .s-title {\n    display: grid;\n    grid-template-rows: 1fr auto auto 1fr;\n    justify-items: center; align-items: center;\n    text-align: center;\n  }\n  .s-title .kicker {\n    grid-row: 1; align-self: end;\n    font-size: 22px; letter-spacing: 0.34em; text-transform: uppercase;\n    font-weight: 700; color: var(--cbc-red); margin-bottom: 30px;\n  }\n  .s-title .logo-big { width: 520px; height: auto; }\n  .s-title .title {\n    font-family: var(--font-family-display);\n    font-weight: 900; font-size: 84px; line-height: 0.95;\n    letter-spacing: -0.025em; color: var(--cbc-blue);\n    max-width: 1500px; margin-top: 44px; text-wrap: balance;\n  }\n  .s-title .title em { font-style: italic; color: var(--cbc-red); }\n  .s-title .subtitle {\n    grid-row: 4; align-self: start;\n    font-size: 27px; color: var(--cbc-ink-soft);\n    margin-top: 30px; max-width: 1100px; line-height: 1.4; text-wrap: balance;\n    font-weight: 500;\n  }\n\n  /* ============================================================ STATEMENT / SUMMARY */\n  .s-summary { display: grid; grid-template-rows: auto 1fr; gap: 56px; }\n  .s-summary .lead {\n    font-family: var(--font-family-display);\n    font-weight: 800; font-size: 56px; line-height: 1.08;\n    letter-spacing: -0.02em; color: var(--cbc-blue);\n    max-width: 1500px; text-wrap: balance;\n  }\n  .s-summary .lead em { color: var(--cbc-red); font-style: italic; }\n  .s-summary .cols {\n    display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 56px;\n    align-self: center;\n  }\n  .s-summary .col { position: relative; padding-top: 34px; }\n  .s-summary .col::before {\n    content: ''; position: absolute; top: 0; left: 0;\n    width: 64px; height: 4px; background: var(--cbc-red);\n  }\n  .s-summary .col h3 {\n    font-size: 28px; font-weight: 800; color: var(--cbc-blue);\n    margin: 0 0 14px; letter-spacing: -0.01em;\n  }\n  .s-summary .col p { font-size: 22px; line-height: 1.5; color: var(--cbc-ink-soft); }\n\n  /* ============================================================ AGENDA (6 fundamentos) */\n  .s-agenda { display: grid; grid-template-rows: auto 1fr; gap: 60px; }\n  .s-agenda .head h1 {\n    font-family: var(--font-family-display);\n    font-weight: 900; font-size: 76px; line-height: 0.95;\n    letter-spacing: -0.02em; color: var(--cbc-cream); margin: 18px 0 0;\n  }\n  .s-agenda .grid {\n    display: grid; grid-template-columns: 1fr 1fr 1fr;\n    grid-template-rows: 1fr 1fr;\n    gap: 30px 56px; align-self: center;\n  }\n  .s-agenda .item {\n    display: flex; align-items: flex-start; gap: 24px;\n    border-top: 2px solid rgba(243,235,224,0.25);\n    padding-top: 24px;\n  }\n  .s-agenda .item .n {\n    font-family: var(--font-family-display);\n    font-weight: 900; font-size: 64px; line-height: 0.8;\n    color: var(--cbc-red); letter-spacing: -0.03em;\n    font-variant-numeric: tabular-nums;\n    flex: 0 0 auto;\n  }\n  .slide.dark .s-agenda .item .n { color: var(--cbc-cream); }\n  .s-agenda .item .t {\n    font-size: 26px; font-weight: 600; line-height: 1.25;\n    color: var(--cbc-cream); padding-top: 6px;\n  }\n\n  /* ============================================================ FUNDAMENTO (numbered) */\n  .s-fund { display: grid; grid-template-columns: 760px 1fr; gap: 90px; align-items: center; }\n  .s-fund .num {\n    font-family: var(--font-family-display);\n    font-weight: 900; font-style: italic;\n    font-size: 540px; line-height: 0.78;\n    color: var(--cbc-red); letter-spacing: -0.06em;\n    font-variant-numeric: tabular-nums;\n    justify-self: start;\n  }\n  .s-fund.on-dark .num { color: var(--cbc-cream); }\n  .s-fund .right { max-width: 820px; }\n  .s-fund .right .eyebrow {\n    font-size: 22px; letter-spacing: 0.26em; text-transform: uppercase;\n    font-weight: 700; color: var(--cbc-red); margin-bottom: 22px;\n  }\n  .s-fund.on-dark .right .eyebrow { color: var(--cbc-cream); opacity: 0.85; }\n  .s-fund .right h1 {\n    font-family: var(--font-family-display);\n    font-weight: 900; font-size: 76px; line-height: 0.98;\n    letter-spacing: -0.02em; color: var(--cbc-blue); margin: 0;\n    text-wrap: balance;\n  }\n  .s-fund.on-dark .right h1 { color: var(--cbc-cream); }\n  .s-fund .right h1 em { color: var(--cbc-red); font-style: italic; }\n  .s-fund .right p {\n    font-size: 26px; line-height: 1.5; color: var(--cbc-ink-soft);\n    margin: 30px 0 0; max-width: 760px;\n  }\n  .s-fund.on-dark .right p { color: rgba(243,235,224,0.85); }\n\n  /* ============================================================ MODERN FIREFIGHTER (contrast) */\n  .s-arquetipo { display: grid; grid-template-rows: auto 1fr; gap: 56px; }\n  .s-arquetipo .head { display: flex; flex-direction: column; gap: 16px; }\n  .s-arquetipo h1 {\n    font-family: var(--font-family-display);\n    font ide s-title\">\n      <div class=\"kicker m-kicker\">Rebranding Institucional · 2026<\u002Fdiv>\n      <img class=\"logo-big m-logo\" src=\"e9605e37-f949-4490-8bfb-fcfe9cfa3a6b\" alt=\"CBC Desde 1883\">\n      <div class=\"title m-title\">Fundamentos estratégicos<br>del <em>rebranding<\u002Fem> del CBC<\u002Fdiv>\n      <div class=\"subtitle\">Honramos nuestra historia para evolucionar el arquetipo del bombero y proyectar nuestro legado hacia las próximas generaciones.<\u002Fdiv>\n      <div class=\"slide-foot\"><div class=\"left\"><span class=\"red-tick\"><\u002Fspan>Cuerpo de Bomberos de Concepción<\u002Fdiv><div class=\"pgn\">01 / 15<\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- 2 · RESUMEN EJECUTIVO -->\n  <section data-label=\"Resumen ejecutivo\">\n    <div class=\"slide s-summary\">\n      <img class=\"corner-logo m-logo\" src=\"e9605e37-f949-4490-8bfb-fcfe9cfa3a6b\" alt=\"CBC\">\n      <div class=\"lead m-title\">Más que una renovación visual:<br>una <em>evolución estratégica<\u002Fem>.<\u002Fdiv>\n      <div class=\"cols\">\n        <div class=\"col\">\n          <h3>Fortalecer la identidad<\u002Fh3>\n          <p>Consolidar una marca sólida que refuerce el reconocimiento y la confianza de la comunidad.<\u002Fp>\n        <\u002Fdiv>\n        <div class=\"col\">\n          <h3>Modernizar la comunicación<\u002Fh3>\n          <p>Una identidad capaz de desenvolverse con eficiencia en los entornos digitales de hoy.<\u002Fp>\n        <\u002Fdiv>\n        <div class=\"col\">\n          <h3>Proyectar el legado<\u002Fh3>\n          <p>Preservar la esencia institucional y adecuarla a las expectativas de la sociedad contemporánea.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"slide-foot\"><div class=\"left\"><span class=\"red-tick\"><\u002Fspan>Resumen ejecutivo<\u002Fdiv><div class=\"pgn\">02 / 15<\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- 3 · AGENDA -->\n  <section data-label=\"Los seis fundamentos\">\n    <div class=\"slide dark s-agenda\">\n      <img class=\"corner-logo m-logo\" src=\"e9605e37-f949-4490-8bfb-fcfe9cfa3a6b\" alt=\"CBC\">\n      <div class=\"head\">\n        <div class=\"eyebrow-row\"><span class=\"word m-eyebrow\">Fundamentos<\u002Fspan><span class=\"rule\"><\u002Fspan><\u002Fdiv>\n        <h1 class=\"m-title\">Seis pilares de<br>una misma visión.<\u002Fh1>\n      <\u002Fdiv>\n      <div class=\"grid\">\n        <div class=\"item\"><span class=\"n\">01<\u002Fspan><span class=\"t\">Una evolución,<br>no una sustitución<\u002Fspan><\u002Fdiv>\n        <div class=\"item\"><span class=\"n\">02<\u002Fspan><span class=\"t\">Evolucionar el<br>arquetipo del bombero<\u002Fspan><\u002Fdiv>\n        <div class=\"item\"><span class=\"n\">03<\u002Fspan><span class=\"t\">Una marca simple,<br>memorable y cercana<\u002Fspan><\u002Fdiv>\n        <div class=\"item\"><span class=\"n\">04<\u002Fspan><span class=\"t\">Adaptación a una<br>sociedad en cambio<\u002Fspan><\u002Fdiv>\n        <div class=\"item\"><span class=\"n\">05<\u002Fspan><span class=\"t\">Fortalecimiento del<br>posicionamiento<\u002Fspan><\u002Fdiv>\n        <div class=\"item\"><span class=\"n\">06<\u002Fspan><span class=\"t\">Una visión para las<br>próximas décadas<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"slide-foot\"><div class=\"left\"><span class=\"red-tick\"><\u002Fspan>Los seis fundamentos<\u002Fdiv><div class=\"pgn\">03 / 15<\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- 4 · FUNDAMENTO 1 -->\n  <section data-label=\"01 Evolución\">\n    <div class=\"slide s-fund\">\n      <img class=\"corner-logo m-logo\" src=\"e9605e37-f949-4490-8bfb-fcfe9cfa3a6b\" alt=\"CBC\">\n      <div class=\"num m-num\">01<\u002Fdiv>\n      <div class=\"right\">\n        <div class=\"eyebrow m-eyebrow\">Fundamento 01<\u002Fdiv>\n        <h1 class=\"m-title\">Una evolución,<br>no una <em>sustitución<\u002Fem>.<\u002Fh1>\n        <p>La marca CBC nace como expresión contemporánea de un legado de más de un siglo. No reemplaza la historia: la proyecta hacia el futuro. La tradición sigue siendo el fundamento sobre el cual se construye lo que viene.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"slide-foot\"><div class=\"left\"><span class=\"red-tick\"><\u002Fspan>Una evolución, no una sustitución<\u002Fdiv><div class=\"pgn\">04 / 15<\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- 5 · FUNDAMENTO 2 -->\n  <section data-label=\"02 Arquetipo\">\n    <div class=\"slide s-fund\">\n      <img class=\"corner-logo m-logo\" src=\"e9605e37-f949-4490-8bfb-fcfe9cfa3a6b\" alt=\"CBC\">\n      <div class=\"num m-num\">02<\u002Fdiv>\n      <div class=\"right\">\n        <div class=\"eyebrow m-eyebrow\">Fundamento 02<\u002Fdiv>\n        <h1 class=\"m-title\">Evolucionar el<br><em>arquetipo<\u002Fem> del bombero.<\u002Fh1>\n        <p>La figura tradicional se asoció al sacrificio y la valentía frente al fuego. La sociedad actual demanda una visión más amplia: la nueva identidad representa ese paradigma sin renunciar a los valores históricos.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"slide-foot\"><div class=\"left\"><span class=\"red-tick\"><\u002Fspan>Evolucionar el arquetipo del bombero<\u002Fdiv><div class=\"pgn\">05 / 15<\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- 6 · BOMBERO SIGLO XXI -->\n  <section data-label=\"Bombero del siglo XXI\">\n    <div class=\"slide dark s-arquetipo\">\n      <img class=\"corner-logo m-logo\" src=\"e9605e37-f949-4490-8bfb-fcfe9cfa3a6b\" alt=\"CBC\">\n      <div class=\"head\">\n        <div class=\"eyebrow-row\"><span class=\"word\">El bombero del siglo XXI<\u002Fspan><span class=\"rule\"><\u002Fspan><\u002Fdiv>\n        <h1>Un servidor público <em>altamente capacitado<\u002Fem>, preparado para múltiples emergencias.<\u002Fh1>\n      <\u002Fdiv>\n      <div class=\"chips\">\n        <span class=\"chip hot\">Prevención<\u002Fspan>\n        <span class=\"chip\">Educación<\u002Fspan>\n        <span class=\"chip hot\">Innovación<\u002Fspan>\n        <span class=\"chip\">Trabajo colaborativo<\u002Fspan>\n        <span class=\"chip hot\">Protección integral<\u002Fspan>\n        <span class=\"chip\">Excelencia operativa<\u002Fspan>\n        <span class=\"chip hot\">Visión de futuro<\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"slide-foot\"><div class=\"left\"><span class=\"red-tick\"><\u002Fspan>El bombero del siglo XXI<\u002Fdiv><div class=\"pgn\">06 / 15<\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- 7 · FUNDAMENTO 3 -->\n  <section data-label=\"03 Marca simple\">\n    <div class=\"slide s-fund\">\n      <img class=\"corner-logo m-logo\" src=\"e9605e37-f949-4490-8bfb-fcfe9cfa3a6b\" alt=\"CBC\">\n      <div class=\"num m-num\">03<\u002Fdiv>\n      <div class=\"right\">\n        <div class=\"eyebrow m-eyebrow\">Fundamento 03<\u002Fdiv>\n        <h1 class=\"m-title\">Una marca simple,<br>memorable y <em>cercana<\u002Fem>.<\u002Fh1>\n        <p>La denominación CBC permite una identidad más reconocible y adaptable a los ecosistemas de comunicación actuales. Una marca sólida fortalece el reconocimiento y la confianza de la comunidad.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"slide-foot\"><div class=\"left\"><span class=\"red-tick\"><\u002Fspan>Una marca simple, memorable y cercana<\u002Fdiv><div class=\"pgn\">07 / 15<\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- 8 · QUÉ FACILITA -->\n  <section data-label=\"Qué facilita\">\n    <div class=\"slide s-list\">\n      <img class=\"corner-logo m-logo\" src=\"e9605e37-f949-4490-8bfb-fcfe9cfa3a6b\" alt=\"CBC\">\n      <div class=\"left\">\n        <div class=\"eyebrow-row\"><span class=\"word\">Aplicación<\u002Fspan><span class=\"rule\"><\u002Fspan><\u002Fdiv>\n        <h1>Qué facilita<br>la marca CBC.<\u002Fh1>\n        <p>Una identidad coherente y consistente, lista para vivir en cada punto de contacto con la comunidad.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"rows\">\n        <div class=\"row\"><span class=\"rn\">01<\u002Fspan><span class=\"rt\">El reconocimiento de la marca<\u002Fspan><\u002Fdiv>\n        <div class=\"row\"><span class=\"rn\">02<\u002Fspan><span class=\"rt\">La comunicación digital<\u002Fspan><\u002Fdiv>\n        <div class=\"row\"><span class=\"rn\">03<\u002Fspan><span class=\"rt\">La presencia en redes sociales<\u002Fspan><\u002Fdiv>\n        <div class=\"row\"><span class=\"rn\">04<\u002Fspan><span class=\"rt\">Uniformes, vehículos y señalética<\u002Fspan><\u002Fdiv>\n        <div class=\"row\"><span class=\"rn\">05<\u002Fspan><span class=\"rt\">Una identidad coherente y consistente<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"slide-foot\"><div class=\"left\"><span class=\"red-tick\"><\u002Fspan>Qué facilita la marca CBC<\u002Fdiv><div class=\"pgn\">08 / 15<\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- 9 · FUNDAMENTO 4 -->\n  <section data-label=\"04 Sociedad en cambio\">\n    <div class=\"slide s-fund\">\n      <img class=\"corner-logo m-logo\" src=\"e9605e37-f949-4490-8bfb-fcfe9cfa3a6b\" alt=\"CBC\">\n      <div class=\"num m-num\">04<\u002Fdiv>\n      <div class=\"right\">\n        <div class=\"eyebrow m-eyebrow\">Fundamento 04<\u002Fdiv>\n        <h1 class=\"m-title\">Adaptación a una<br>sociedad en <em>transformación<\u002Fem>.<\u002Fh1>\n        <p>La forma en que las personas se informan, interactúan y construyen vínculos ha cambiado profundamente. El CBC necesita una identidad eficiente en entornos digitales, plataformas audiovisuales y nuevos espacios de interacción.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"slide-foot\"><div class=\"left\"><span class=\"red-tick\"><\u002Fspan>Adaptación a una sociedad en transformación<\u002Fdiv><div class=\"pgn\">09 / 15<\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- 10 · FUNDAMENTO 5 -->\n  <section data-label=\"05 Posicionamiento\">\n    <div class=\"slide s-fund\">\n      <img class=\"corner-logo m-logo\" src=\"e9605e37-f949-4490-8bfb-fcfe9cfa3a6b\" alt=\"CBC\">\n      <div class=\"num m-num\">05<\u002Fdiv>\n      <div class=\"right\">\n        <div class=\"eyebrow m-eyebrow\">Fundamento 05<\u002Fdiv>\n        <h1 class=\"m-title\">Fortalecimiento del<br><em>posicionamiento<\u002Fem>.<\u002Fh1>\n        <p>La identidad es uno de los principales activos estratégicos. Una marca fuerte y coherente fortalece la reputación del CBC, potencia la confianza ciudadana y refuerza el vínculo con autoridades, empresas y organizaciones colaboradoras.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"slide-foot\"><div class=\"left\"><span class=\"red-tick\"><\u002Fspan>Fortalecimiento del posicionamiento<\u002Fdiv><div class=\"pgn\">10 / 15<\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- 11 · ATRIBUTOS -->\n  <section data-label=\"Atributos que nos distinguen\">\n    <div class=\"slide dark s-values\">\n      <img class=\"corner-logo m-logo\" src=\"e9605e37-f949-4490-8bfb-fcfe9cfa3a6b\" alt=\"CBC\">\n      <div class=\"head\">\n        <div class=\"eyebrow-row\"><span class=\"word\">Percepción<\u002Fspan><span class=\"rule\"><\u002Fspan><\u002Fdiv>\n        <h1>Atributos que nos distinguen.<\u002Fh1>\n      <\u002Fdiv>\n      <div class=\"grid\">\n        <div class=\"v\"><span class=\"vn\">01<\u002Fspan><span class=\"vt\">Servicio<\u002Fspan><\u002Fdiv>\n        <div class=\"v\"><span class=\"vn\">02<\u002Fspan><span class=\"vt\">Vocación<\u002Fspan><\u002Fdiv>\n        <div class=\"v\"><span class=\"vn\">03<\u002Fspan><span class=\"vt\">Profesionalismo<\u002Fspan><\u002Fdiv>\n        <div class=\"v\"><span class=\"vn\">04<\u002Fspan><span class=\"vt\">Disciplina<\u002Fspan><\u002Fdiv>\n        <div class=\"v\"><span class=\"vn\">05<\u002Fspan><span class=\"vt\">Confianza<\u002Fspan><\u002Fdiv>\n        <div class=\"v\"><span class=\"vn\">06<\u002Fspan><span class=\"vt\">Cercanía<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"slide-foot\"><div class=\"left\"><span class=\"red-tick\"><\u002Fspan>Atributos que nos distinguen<\u002Fdiv><div class=\"pgn\">11 / 15<\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- 12 · FUNDAMENTO 6 -->\n  <section data-label=\"06 Visión\">\n    <div class=\"slide s-fund\">\n      <img class=\"corner-logo m-logo\" src=\"e9605e37-f949-4490-8bfb-fcfe9cfa3a6b\" alt=\"CBC\">\n      <div class=\"num m-num\">06<\u002Fdiv>\n      <div class=\"right\">\n        <div class=\"eyebrow m-eyebrow\">Fundamento 06<\u002Fdiv>\n        <h1 class=\"m-title\">Una visión para las<br>próximas <em>décadas<\u002Fem>.<\u002Fh1>\n        <p>La marca CBC fue concebida para trascender generaciones y adaptarse a los cambios sin perder su esencia. El desafío: entregar a las futuras generaciones una institución preparada para los retos del mañana.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"slide-foot\"><div class=\"left\"><span class=\"red-tick\"><\u002Fspan>Una visión para las próximas décadas<\u002Fdiv><div class=\"pgn\">12 / 15<\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- 13 · CONCLUSIÓN -->\n  <section data-label=\"Conclusión\">\n    <div class=\"slide s-concl\">\n      <img class=\"corner-logo m-logo\" src=\"e9605e37-f949-4490-8bfb-fcfe9cfa3a6b\" alt=\"CBC\">\n      <div class=\"lead m-title\">La marca CBC es una <em>declaración<\u002Fem> sobre la institución que queremos seguir construyendo.<\u002Fdiv>\n      <div class=\"three\">\n        <div class=\"b\">\n          <div class=\"ico\"><svg viewBox=\"0 0 24 24\"><circle cx=\"12\" cy=\"8\" r=\"6\"><\u002Fcircle><path d=\"M15.5 13.4 17 22l-5-3-5 3 1.5-8.6\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n          <h3>Honramos la historia<\u002Fh3>\n          <p>Reconocemos el origen que nos dio identidad y propósito.<\u002Fp>\n        <\u002Fdiv>\n        <div class=\"b\">\n          <div class=\"ico\"><svg viewBox=\"0 0 24 24\"><path d=\"M12 2 4 5v6c0 5 3.5 9 8 11 4.5-2 8-6 8-11V5z\"><\u002Fpath><path d=\"m9 11.5 2 2 4-4\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n          <h3>Preservamos los valores<\u002Fh3>\n          <p>Mantenemos intacto aquello que nos distingue.<\u002Fp>\n        <\u002Fdiv>\n        <div class=\"b\">\n          <div class=\"ico\"><svg viewBox=\"0 0 24 24\"><circle cx=\"12\" cy=\"12\" r=\"9.5\"><\u002Fcircle><polygon points=\"15.8 8.2 13.7 13.7 8.2 15.8 10.3 10.3\"><\u002Fpolygon><\u002Fsvg><\u002Fdiv>\n          <h3>Evolucionamos<\u002Fh3>\n          <p>Asumimos la responsabilidad de servir a las próximas generaciones.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"slide-foot\"><div class=\"left\"><span class=\"red-tick\"><\u002Fspan>Conclusión<\u002Fdiv><div class=\"pgn\">13 / 15<\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- 14 · QUOTE -->\n  <section data-label=\"El legado se honra evolucionando\">\n    <div class=\"slide s-quote\">\n      <div class=\"qmark m-mark-quote\">“<\u002Fdiv>\n      <div class=\"q m-title\">El legado no se conserva permaneciendo inmóvil.<br>El legado se honra <span style=\"text-decoration: underline; text-decoration-thickness: 8px; text-underline-offset: 16px;\">evolucionando<\u002Fspan>.<\u002Fdiv>\n      <div class=\"attr\">Cuerpo de Bomberos de Concepción<\u002Fdiv>\n      <div class=\"slide-foot\"><div class=\"left\"><span class=\"red-tick\"><\u002Fspan>Manifiesto<\u002Fdiv><div class=\"pgn\">14 / 15<\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- 15 · CLOSING -->\n  <section data-label=\"Cierre\">\n    <div class=\"slide s-close\">\n      <img class=\"logo-big m-logo\" src=\"e9605e37-f949-4490-8bfb-fcfe9cfa3a6b\" alt=\"CBC Desde 1883\">\n      <div class=\"tag\"><strong>Abnegación y Constancia.<\u002Fstrong> Desde 1883, proyectando nuestro legado hacia las próximas generaciones.<\u002Fdiv>\n      <div class=\"slide-foot\"><div class=\"left\"><span class=\"red-tick\"><\u002Fspan>Gracias<\u002Fdiv><div class=\"pgn\">15 / 15<\u002Fdiv>
